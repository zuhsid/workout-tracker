<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Workout Tracker</title>
    <style>
      :root {
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, monospace;
        --color-text-primary: #1a1a18;
        --color-text-secondary: #52514c;
        --color-text-tertiary: #888780;
        --color-text-info: #0C447C;
        --color-text-success: #085041;
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f4ef;
        --color-background-info: #E6F1FB;
        --color-background-success: #E1F5EE;
        --color-border-secondary: #d6d5cd;
        --color-border-tertiary: #e8e7e0;
        --color-border-info: #85B7EB;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--color-background-secondary);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
        -webkit-text-size-adjust: 100%;
      }
      #root {
        max-width: 720px;
        margin: 0 auto;
        padding: 0 1rem env(safe-area-inset-bottom);
        min-height: 100vh;
        background: var(--color-background-secondary);
      }
      input, select, textarea {
        font-family: inherit;
        font-size: 16px; /* prevents iOS zoom on focus */
        padding: 8px 10px;
        border-radius: 8px;
        border: 0.5px solid var(--color-border-secondary);
        background: var(--color-background-primary);
        color: var(--color-text-primary);
      }
      .sr-only {
        position: absolute; width: 1px; height: 1px;
        padding: 0; margin: -1px; overflow: hidden;
        clip: rect(0,0,0,0); white-space: nowrap; border: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
